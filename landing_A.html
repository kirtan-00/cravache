<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CravAche — Landing A (Live Office)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#f4e8cf; --teal:#9fe8ff; --gold:#ffe066; --warm:#ff9a56; --red:#ff5c5c; --green:#7ee08a; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; background:#05070f; overflow:hidden; }
  #wrap{ position:absolute; left:50%; top:50%; width:1280px; height:720px; transform:translate(-50%,-50%); }
  #bg{ position:absolute; inset:0; image-rendering:pixelated; }
  #ui{ position:absolute; inset:0; font-family:'VT323',monospace; }

  /* clock chip */
  .clock{ position:absolute; top:20px; right:26px; z-index:3; background:rgba(12,17,32,.82); border:2px solid #1a2440;
    color:var(--teal); padding:7px 14px; font-family:'Silkscreen'; font-size:13px; letter-spacing:1px;
    box-shadow:0 3px 0 #05070f; }
  .clock b{ color:var(--warm); }

  /* logo — sits in clean dark space BELOW the window strip */
  .logo{ position:absolute; top:300px; left:0; right:0; text-align:center; font-family:'Silkscreen';
    font-weight:700; font-size:108px; letter-spacing:6px; line-height:.9; z-index:2; }
  .logo .crav{ color:var(--cream); text-shadow:0 5px 0 #05070f, 0 0 24px rgba(244,232,207,.25); }
  .logo .ache{ color:var(--teal); text-shadow:0 5px 0 #05070f, 0 0 28px rgba(159,232,255,.55);
    animation:flicker 6s infinite steps(1); transition:color .15s, text-shadow .15s; }
  /* hover the title -> the neon sign lights up brighter */
  .logo{ cursor:pointer; }
  .logo:hover .ache{ color:#d6f1ff; text-shadow:0 5px 0 #05070f, 0 0 46px rgba(159,232,255,1), 0 0 14px rgba(159,232,255,.9); animation:none; }
  .logo:hover .crav{ color:#fff; text-shadow:0 5px 0 #05070f, 0 0 38px rgba(244,232,207,.7); }
  @keyframes flicker{ 0%,97%,100%{opacity:1} 97.5%{opacity:.45} 98%{opacity:1} 98.5%{opacity:.5} }
  .tag{ position:absolute; top:420px; left:0; right:0; text-align:center; color:var(--gold);
    font-size:30px; letter-spacing:3px; text-shadow:0 2px 0 #05070f; z-index:2; }
  .tag .cursor{ animation:blink 1s steps(1) infinite; color:var(--cream); }
  @keyframes blink{ 50%{opacity:0} }

  /* buttons */
  .btns{ position:absolute; top:500px; left:0; right:0; display:flex; gap:22px; justify-content:center; align-items:center; z-index:2; }
  .btn{ font-family:'Silkscreen'; font-size:22px; letter-spacing:2px; padding:18px 40px; cursor:pointer;
    border:none; color:#05281a; background:var(--green); box-shadow:0 6px 0 #2c7a4a, 0 10px 22px rgba(0,0,0,.5);
    position:relative; transition:transform .08s, box-shadow .08s; }
  .btn .play{ margin-right:10px; }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 8px 0 #2c7a4a, 0 14px 26px rgba(0,0,0,.55); }
  .btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #2c7a4a; }
  .btn-main{ animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 6px 0 #2c7a4a, 0 0 0 0 rgba(126,224,138,.45) } 50%{ box-shadow:0 6px 0 #2c7a4a, 0 0 0 12px rgba(126,224,138,0) } }
  .btn-ghost{ background:transparent; color:var(--cream); border:2px solid #2a3550; box-shadow:0 5px 0 #05070f; }
  .btn-ghost:hover{ color:var(--teal); border-color:var(--teal); }

  .hint{ position:absolute; top:590px; left:0; right:0; text-align:center; color:#7d8bb0; font-size:20px; letter-spacing:1px; z-index:2; }

  /* brief ticker — quieter: smaller + low opacity, tucked at the very bottom */
  .ticker{ position:absolute; left:0; right:0; bottom:26px; height:26px; overflow:hidden; opacity:.5;
    border-top:1px solid #131c34; border-bottom:1px solid #131c34; background:rgba(8,11,21,.45); z-index:2; }
  .ticker .label{ position:absolute; left:0; top:0; bottom:0; z-index:2; background:rgba(255,92,92,.75); color:#fff;
    font-family:'Silkscreen'; font-size:10px; display:flex; align-items:center; padding:0 11px; box-shadow:6px 0 10px rgba(0,0,0,.4); }
  .ticker .run{ position:absolute; white-space:nowrap; top:3px; color:var(--gold); font-size:17px; letter-spacing:1px;
    animation:scroll 40s linear infinite; padding-left:130px; }
  @keyframes scroll{ from{ transform:translateX(60%) } to{ transform:translateX(-100%) } }

  .footer{ position:absolute; bottom:5px; left:0; right:0; text-align:center; color:#46527a; font-size:14px; letter-spacing:1px; z-index:2; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bg" width="1280" height="720"></canvas>
  <div id="ui">
    <div class="clock">MON <b>9:00</b> AM · WK 1</div>
    <div class="logo"><span class="crav">CRAV</span><span class="ache">ACHE</span></div>
    <div class="tag">an indian ad agency survival sim<span class="cursor">_</span></div>
    <div class="btns">
      <button class="btn btn-main"><span class="play">▶</span>PUNCH IN</button>
      <button class="btn btn-ghost">CONTINUE SHIFT</button>
    </div>
    <div class="hint">laptop only · sound on recommended · the briefs are already absurd</div>
    <div class="ticker">
      <div class="label">⚡ INCOMING</div>
      <div class="run" id="run"></div>
    </div>
    <div class="footer">a CrayWingz fever dream · v-trial</div>
  </div>
</div>
<script>
(function(){
  // ---------- responsive fit ----------
  var wrap = document.getElementById('wrap');
  function fit(){ var s = Math.min(innerWidth/1280, innerHeight/720); wrap.style.transform = 'translate(-50%,-50%) scale('+s+')'; }
  addEventListener('resize', fit); fit();

  // ---------- ticker copy ----------
  var BRIEFS = [
    'ZappIndia: "make the logo bigger AND smaller"',
    'a client wants it to "go viral" · budget ₹1,000',
    'CEO hates blue. the brief is a blue ocean strategy.',
    'reel due yesterday · feedback due never',
    '"same but different" · "make it pop" · "we\'ll know it when we see it"'
  ];
  document.getElementById('run').textContent = BRIEFS.join('      •      ') + '      •      ';

  // ---------- scene ----------
  var c = document.getElementById('bg'), x = c.getContext('2d');
  x.imageSmoothingEnabled = false;

  // exposed clock so a test harness can fast-forward the timelapse
  // window.__clock is in SECONDS; the day-cycle reads from it.
  window.__clock = 0;
  var DAY = 16; // full sunrise->day->sunset->night->loop, in seconds

  // a calm, well-spaced single low row of desks (4)
  var DESKS = [];   // employees removed from the landing per direction (cleaner hero)
  var SKIN = ['#8a5638','#7a4a30','#9a6440','#a8744c'];
  var SHIRT = ['#2a5860','#3a3460','#5e4824','#5e2e30'];
  function seeded(i,m){ return ((i*2654435761)>>>0)%m; }

  // very subtle dust
  var motes = [];
  for(var i=0;i<24;i++) motes.push({ x:Math.random()*1280, y:Math.random()*720, s:0.15+Math.random()*0.35, r:Math.random()*2+1, p:Math.random()*6.28 });

  // stars (within the window strip, normalised 0..1)
  var stars = []; for(i=0;i<28;i++) stars.push({ x:Math.random(), y:Math.random()*0.82 });

  // clouds (normalised x drift + y band + width)
  var clouds = []; for(i=0;i<5;i++) clouds.push({ x:Math.random(), y:0.18+Math.random()*0.4, w:50+Math.random()*70, sp:0.006+Math.random()*0.01 });

  function glow(cx,cy,r,col,a){
    var g = x.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0, col+a+')'); g.addColorStop(1, col+'0)');
    x.save(); x.globalCompositeOperation='lighter'; x.fillStyle=g; x.fillRect(cx-r,cy-r,r*2,r*2); x.restore();
  }

  function lerp(a,b,t){ return a+(b-a)*t; }
  function mixHex(h1,h2,t){
    var r1=parseInt(h1.slice(1,3),16),g1=parseInt(h1.slice(3,5),16),b1=parseInt(h1.slice(5,7),16);
    var r2=parseInt(h2.slice(1,3),16),g2=parseInt(h2.slice(3,5),16),b2=parseInt(h2.slice(5,7),16);
    return 'rgb('+Math.round(lerp(r1,r2,t))+','+Math.round(lerp(g1,g2,t))+','+Math.round(lerp(b1,b2,t))+')';
  }

  // 4 keyframe skies, each = [topBand, midBand, bottomBand]
  var SKIES = [
    // morning — warm sunrise
    ['#2a3a6e','#7a5a86','#ffb070'],
    // afternoon — clear blue
    ['#2f6fd0','#5aa6e8','#bfe6ff'],
    // evening — orange/purple sunset
    ['#3a2a66','#a24a72','#ff9a56'],
    // night — deep blue
    ['#070b1c','#0e1738','#1c2a52']
  ];

  // returns { sky:[3], sun:0..1 brightness, night:0..1, sunY:px-within-strip, sunX:px, isMoon:bool, glowCol }
  function dayState(strip){
    var f = (window.__clock % DAY) / DAY;       // 0..1 through the day
    var seg = f*4;                               // 0..4 across 4 keyframes
    var i0 = Math.floor(seg)%4, i1=(i0+1)%4, tt = seg-Math.floor(seg);
    // smoothstep the cross-fade so bands ease between states
    var s = tt*tt*(3-2*tt);
    var sky = [ mixHex(SKIES[i0][0],SKIES[i1][0],s), mixHex(SKIES[i0][1],SKIES[i1][1],s), mixHex(SKIES[i0][2],SKIES[i1][2],s) ];
    // night factor: peaks at f≈0.875 (the night keyframe), ~0 elsewhere
    var night = 0;
    if(i0===3){ night = 1-s; }           // night -> morning
    else if(i1===3){ night = s; }        // evening -> night
    night = Math.max(0, Math.min(1, night));
    var isNight = night > 0.5;
    // sun/moon arc across the strip; one body that swaps to a moon at night
    var arc = (f % 0.5)/0.5;             // sun arcs in day half, moon in night half
    var bodyX = strip.x + 40 + arc*(strip.w-80);
    var bodyY = strip.y + strip.h*0.72 - Math.sin(arc*Math.PI)*(strip.h*0.55);
    return { sky:sky, night:night, isNight:isNight, bx:bodyX, by:bodyY, f:f };
  }

  function windowStrip(){
    // wide cinematic letterbox strip near the very top
    var s = {x:0, y:0, w:1280, h:206};
    var ds = dayState(s);

    // sky bands (flat, chunky — 3 stacked colour bands)
    x.fillStyle = ds.sky[0]; x.fillRect(s.x, s.y, s.w, s.h*0.42);
    x.fillStyle = ds.sky[1]; x.fillRect(s.x, s.y+s.h*0.42, s.w, s.h*0.30);
    x.fillStyle = ds.sky[2]; x.fillRect(s.x, s.y+s.h*0.72, s.w, s.h*0.28);

    // stars — fade in only at night
    if(ds.night > 0.02){
      for(var i=0;i<stars.length;i++){ var tw=(Math.sin(window.__clock*2+i*1.7)+1)/2;
        x.fillStyle='rgba(220,230,255,'+(ds.night*(.25+tw*.6)).toFixed(3)+')';
        x.fillRect(s.x+stars[i].x*s.w, s.y+stars[i].y*s.h*0.7, 2,2); }
    }

    // clouds — drift in the day (fade out at night)
    var dayAmt = 1-ds.night;
    if(dayAmt > 0.05){
      for(i=0;i<clouds.length;i++){ var cl=clouds[i];
        var px=((cl.x + window.__clock*cl.sp)%1.2 - 0.1)*s.w;
        var py=s.y+cl.y*s.h;
        x.fillStyle='rgba(244,244,255,'+(0.28*dayAmt).toFixed(3)+')';
        x.fillRect(px, py, cl.w, 8);
        x.fillRect(px+14, py-6, cl.w-30, 8);
      }
    }

    // sun / moon
    if(ds.isNight){
      // moon + glow + crater
      glow(ds.bx,ds.by,48,'rgba(230,236,255,', (ds.night*0.5).toFixed(3));
      x.fillStyle='#e6ecff'; x.fillRect(ds.bx-13,ds.by-13,26,26);
      x.fillStyle=ds.sky[0]; x.fillRect(ds.bx+2,ds.by-8,8,8);
    } else {
      // sun — colour warms toward sunrise/sunset
      var warm = Math.min(1, ds.night*0 + 1); // base
      var sunCol = (ds.f<0.12 || (ds.f>0.38&&ds.f<0.5)) ? '#ffb060' : '#ffe9b0';
      glow(ds.bx,ds.by,70,'rgba(255,210,120,', (0.45*dayAmt).toFixed(3));
      x.fillStyle=sunCol; x.fillRect(ds.bx-16,ds.by-16,32,32);
    }

    // skyline silhouette along the bottom of the strip
    x.fillStyle='rgba(7,11,28,'+(0.85).toFixed(2)+')';
    var sky=[[40,46],[150,70],[300,40],[470,64],[640,40],[800,72],[980,44],[1140,66]];
    for(i=0;i<sky.length;i++){ x.fillRect(sky[i][0], s.y+s.h-sky[i][1], 70, sky[i][1]); }
    // a blinking aircraft light on one tower
    if(Math.floor(window.__clock*2)%2===0){ x.fillStyle='#ff5c5c'; x.fillRect(800+30, s.y+s.h-70,3,3); }

    // window frame: outer + mullions dividing the strip into panes
    x.fillStyle='#202b48';
    for(var mx=s.w/4; mx<s.w; mx+=s.w/4){ x.fillRect(mx-3, s.y, 6, s.h); } // vertical mullions (4 panes)
    x.fillRect(s.x, s.y+s.h*0.5-3, s.w, 6);                                // horizontal mullion
    // sill + heavy frame
    x.fillStyle='#161e34'; x.fillRect(s.x, s.y+s.h, s.w, 10);
    x.lineWidth=10; x.strokeStyle='#1a2440'; x.strokeRect(s.x-5, s.y-5, s.w+10, s.h+10);

    // soft inner shadow under the sill to separate strip from the dark room
    var sh=x.createLinearGradient(0,s.y+s.h,0,s.y+s.h+70);
    sh.addColorStop(0,'rgba(5,7,15,.6)'); sh.addColorStop(1,'rgba(5,7,15,0)');
    x.fillStyle=sh; x.fillRect(0,s.y+s.h,1280,70);
    return ds;
  }

  function deskUnit(d,i){
    glow(d.x, d.y+2, 80, 'rgba(150,196,255,', (.22+.05*Math.sin(window.__clock*3+i)).toFixed(2));
    var skin=SKIN[seeded(i+1,4)], shirt=SHIRT[seeded(i+3,4)];
    x.fillStyle=shirt; x.fillRect(d.x-24, d.y-38, 48, 50);              // shoulders
    x.fillStyle=skin;  x.fillRect(d.x-11, d.y-66, 22, 22);             // head
    x.fillStyle='#14110d'; x.fillRect(d.x-12, d.y-68, 24, 10);         // hair
    x.fillStyle='rgba(170,205,255,.5)'; x.save(); x.globalCompositeOperation='lighter'; x.fillRect(d.x-9,d.y-51,18,7); x.restore();
    x.fillStyle='#241c14'; x.fillRect(d.x-66, d.y, 132, 12);           // desk top
    x.fillStyle='#19130c'; x.fillRect(d.x-66, d.y+12, 132, 30);        // desk body
    x.fillStyle='#3a3f47'; x.fillRect(d.x-21, d.y-21, 42, 23);         // laptop lid
    x.fillStyle='#54585f'; x.fillRect(d.x-21, d.y-21, 42, 2);
    x.fillStyle='rgba(210,228,255,.9)'; x.fillRect(d.x-2, d.y-11, 4, 5); // apple
    x.fillStyle='rgba(190,222,255,'+(.7+.3*Math.abs(Math.sin(window.__clock*5+i))).toFixed(2)+')'; x.fillRect(d.x-18,d.y-24,36,3);
  }

  function frame(){
    window.__clock += 1/60;

    // room background — dim, calm
    var g = x.createLinearGradient(0,0,0,720);
    g.addColorStop(0,'#080c18'); g.addColorStop(.5,'#0b1020'); g.addColorStop(1,'#06090f');
    x.fillStyle=g; x.fillRect(0,0,1280,720);

    // the timelapse window strip (hero)
    windowStrip();

    // ceiling-to-room falloff just under the strip
    var cg=x.createLinearGradient(0,216,0,330); cg.addColorStop(0,'rgba(0,0,0,.45)'); cg.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=cg; x.fillRect(0,216,1280,114);

    // very subtle dust
    for(var m=0;m<motes.length;m++){ var mo=motes[m]; mo.y-=mo.s; mo.x+=Math.sin(window.__clock+mo.p)*.15; if(mo.y<-4){mo.y=724; mo.x=Math.random()*1280;}
      x.fillStyle='rgba(200,220,255,'+(0.03+0.04*((Math.sin(window.__clock*2+mo.p)+1)/2))+')'; x.fillRect(mo.x,mo.y,mo.r,mo.r); }

    // soft low row of desks (back-to-front)
    var order = DESKS.map(function(d,i){return {d:d,i:i};}).sort(function(a,b){return a.d.y-b.d.y;});
    for(var k=0;k<order.length;k++) deskUnit(order[k].d, order[k].i);

    // side vignette + bottom seat for the UI
    var vg=x.createLinearGradient(0,0,1280,0); vg.addColorStop(0,'rgba(0,0,0,.5)'); vg.addColorStop(.22,'rgba(0,0,0,0)'); vg.addColorStop(.78,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.5)');
    x.fillStyle=vg; x.fillRect(0,0,1280,720);
    var bv=x.createLinearGradient(0,470,0,720); bv.addColorStop(0,'rgba(5,7,15,0)'); bv.addColorStop(1,'rgba(5,7,15,.72)');
    x.fillStyle=bv; x.fillRect(0,470,1280,250);

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
